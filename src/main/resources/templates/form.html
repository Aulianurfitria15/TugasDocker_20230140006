<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Mahasiswa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            margin-bottom: 25px;
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
        }

        .header h2 {
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
        }

        .radio-group {
            margin: 12px 0;
            display: flex;
            align-items: center;
        }

        .radio-group input[type="radio"] {
            margin-right: 8px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .radio-group label {
            display: inline;
            margin: 0;
            margin-left: 5px;
            font-weight: 400;
            cursor: pointer;
        }

        .button-group {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        .submit-btn {
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .back-link {
            display: inline-block;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Form Input Mahasiswa</h2>
    </div>

    <form action="/tambah-mahasiswa" method="post">
        <div class="form-group">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama mahasiswa" required>
        </div>

        <div class="form-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" name="nim" placeholder="Masukkan NIM mahasiswa" required>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <div class="radio-group">
                <input type="radio" name="jenisKelamin" value="Laki-laki" id="lk" required>
                <label for="lk">Laki-laki</label>
            </div>
            <div class="radio-group">
                <input type="radio" name="jenisKelamin" value="Perempuan" id="pr">
                <label for="pr">Perempuan</label>
            </div>
        </div>

        <div class="button-group">
            <button type="submit" class="submit-btn">Submit</button>
        </div>
    </form>

    <a href="/home" class="back-link">Kembali ke Home</a>
</div>
</body>
</html>
