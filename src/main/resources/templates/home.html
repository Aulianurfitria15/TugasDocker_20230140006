<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - MY Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .welcome-msg {
            color: #666;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .input-link {
            display: inline-block;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .input-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        .input-link::before {
            content: "+ ";
            font-weight: bold;
        }

        .table-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        table thead {
            background-color: #007bff;
        }

        table th {
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #007bff;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        table tbody tr:hover {
            background-color: #f9f9f9;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            color: #999;
            font-style: italic;
        }

        .logout-link {
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .logout-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        .footer {
            border-top: 2px solid #333;
            padding-top: 15px;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>MY Website 20210140019</h1>
        <p class="welcome-msg">Selamat datang di aplikasi!</p>
    </div>

    <a href="/form" class="input-link">Input Data Mahasiswa</a>

    <div class="table-title">Data Mahasiswa</div>
    <table>
        <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mhs, stat : ${mahasiswaList}">
            <td th:text="${stat.count}"></td>
            <td th:text="${mhs.username}"></td>
            <td th:text="${mhs.password}"></td>
            <td th:text="${mhs.jenisKelamin}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(mahasiswaList)}">
            <td colspan="4" class="empty-message">Belum ada data</td>
        </tr>
        </tbody>
    </table>

    <div class="footer">
        <a href="/" class="logout-link">Logout</a>
    </div>
</div>
</body>
</html>
